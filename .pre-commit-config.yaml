# Install both hooks: pre-commit install (needs commit-msg for Conventional Commits)
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        files: ^notebooks/.*\.ipynb$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.5
    hooks:
      - id: ruff
        args: [--fix]
        # Jupytext mirrors notebooks/*.py from *.ipynb — ruff must not rewrite those .py files
        exclude: ^notebooks/.*\.py$
      - id: ruff-format
        exclude: ^notebooks/.*\.py$

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.8.5
    hooks:
      - id: nbqa-ruff
        args: [--fix]
        files: ^notebooks/.*\.ipynb$

  # Last: nbQA may edit .ipynb — sync paired .py so pairs stay consistent for commit
  - repo: https://github.com/mwouts/jupytext
    rev: v1.19.1
    hooks:
      - id: jupytext
        args: [--sync]
        files: ^notebooks/.*\.(ipynb|py)$
